	<div class="next">
  		<p>つづく →</p>
	</div>

<script>
const sections = document.querySelectorAll('.section');
const nextSections = document.querySelectorAll('.next');
const poteto = document.querySelector(".poteto");

let isMoving = false;
let lastScrollY = window.scrollY;
let moveX = 0;　//今いる場所の定義

function checkScroll() {

  const currentScrollY = window.scrollY;　
	
const indicator = document.getElementById("section-indicator");//ページカウント

sections.forEach((section, index) => {
  const rect = section.getBoundingClientRect();

  if (rect.top < window.innerHeight && rect.bottom > 0) {
    indicator.textContent = `#${index + 1}`;
  }
});
	
	// 👇 .showの処理はcheckScrollの中に入れる*/
sections.forEach(section => {
const rect = section.getBoundingClientRect();

  if (rect.top < window.innerHeight && rect.bottom > 0) {// 上が画面内に入った＆// 下もまだ画面内にある
      section.classList.add('show');
    }
  });
  // 向き
  if (currentScrollY > lastScrollY) {
    poteto.style.transform = "scaleX(-1)";
  } else {
    poteto.style.transform = "scaleX(1)";
  }
  lastScrollY = currentScrollY;

  // 🐕 今見えてるsectionだけ取得
  let activeSection = null;

  sections.forEach(section => {
    const rect = section.getBoundingClientRect();
    if (rect.top < window.innerHeight && rect.bottom > 0) {
      activeSection = section;
    }
  });

  // 🐕 行きたい位置（←これがtargetX🔥）
  let targetX = (currentScrollY / document.body.scrollHeight) * window.innerWidth;

  // 🐕 activeなsectionに対応する.nextだけ見る
  if (activeSection) {
    const next = activeSection.nextElementSibling;

    if (next && next.classList.contains('next')) {
      const rect = next.getBoundingClientRect();

      if (rect.top < window.innerHeight * 0.9) {
        const nextCenter = rect.left + rect.width / 2;

        targetX = nextCenter - 40;

        // 止める
        poteto.style.animationPlayState = "paused";
      } else {
        poteto.style.animationPlayState = "running";
      }

      // 遷移
      if (rect.top < window.innerHeight * 0.8 && !isMoving) {
        isMoving = true;
        document.body.classList.add('fade-out');

        setTimeout(() => {
          window.location.href = "day2.html";
        }, 800);
      }
    }
  }

  // 🐕 ターゲットにぬるっと移動（ここ重要🔥）
  moveX += (targetX - moveX) * 0.1;

  // 🐕 反映
  moveX = Math.max(0, Math.min(moveX, window.innerWidth - 80));
  poteto.style.left = moveX + "px";
}

checkScroll();/*チェックスクロール*/
window.addEventListener('scroll', checkScroll);

</script>
