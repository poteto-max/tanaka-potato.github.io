		<div class="section">
			<h2>一つ森公園<time datetime="2026-04-16">2026/04/16</time></h2>
			<img src="images/poteto_0416.png" alt="一つ森公園">
			<div class="poteto"></div>
		</div>
		<div class="next">
  			<p>つづく →</p>
		</div>


<script>
const sections = document.querySelectorAll('.section');
const nextSections = document.querySelectorAll('.next');
const poteto = document.querySelector(".poteto");

let isMoving = false;
let lastScrollY = window.scrollY;

function checkScroll() {

  const currentScrollY = window.scrollY;

  // 向き
  if (currentScrollY > lastScrollY) {
    poteto.style.transform = "scaleX(-1)";
  } else {
    poteto.style.transform = "scaleX(1)";
  }
  lastScrollY = currentScrollY;

  // 🐕 今見えてるsectionだけ取得
  let activeSection = null;

  sections.forEach(section => {
    const rect = section.getBoundingClientRect();
    if (rect.top < window.innerHeight && rect.bottom > 0) {
      activeSection = section;
    }
  });

  // 🐕 通常移動
  let moveX = (currentScrollY / document.body.scrollHeight) * window.innerWidth;

  // 🐕 activeなsectionに対応する.nextだけ見る
  if (activeSection) {
    const next = activeSection.nextElementSibling;

    if (next && next.classList.contains('next')) {
      const rect = next.getBoundingClientRect();

      if (rect.top < window.innerHeight * 0.9) {
        const nextCenter = rect.left + rect.width / 2;
        moveX = nextCenter - 40;
      }

      // 遷移
      if (rect.top < window.innerHeight * 0.8 && !isMoving) {
        isMoving = true;
        document.body.classList.add('fade-out');

        setTimeout(() => {
          window.location.href = "day3.html";
        }, 800);
      }
    }
  }

  moveX = Math.max(0, Math.min(moveX, window.innerWidth - 80));
  poteto.style.left = moveX + "px";

  // ふわっと表示
  sections.forEach(section => {
    const pos = section.getBoundingClientRect().top;
    if (pos < window.innerHeight / 1.2) {
      section.classList.add('show');
    }
  });
}

checkScroll();
window.addEventListener('scroll', checkScroll);
	window.addEventListener("scroll", () => {
  const poteto = document.querySelector(".poteto");
  const section = document.querySelector(".section");

  const rect = section.getBoundingClientRect();
  const windowHeight = window.innerHeight;

  // セクションが画面に入ってる時だけ動く
  if (rect.top < windowHeight && rect.bottom > 0) {

    const scrollRatio = (windowHeight - rect.top) / (windowHeight + rect.height);

    const moveX = scrollRatio * window.innerWidth;

    poteto.style.left = moveX + "px";
  }
});
	const activeSection = [...sections].find(section => {
  const rect = section.getBoundingClientRect();
  return rect.top < window.innerHeight && rect.bottom > 0;
})
</script>
