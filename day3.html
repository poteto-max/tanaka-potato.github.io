	<body>
		<header><a href="index.html"><img src="images/ponde_potato01.png" alt="ポンデポテト"></a>
			<h1>ポテトとお芋</h1>
			<img src="images/logo_poteto.png" alt="横向きのイラスト" class="logo">
		</header>

	<div class="section">
		<h2>ハミングロード<time datetime="2026-02-18">2026/02/18</time><date>2026/02/18</date></h2>
		<img src="images/poteto_0218.png" alt="大好きなハミングロード">
	</div>
	<div class="next">
  		<p>つづく →</p>
	</div>

<script>
const sections = document.querySelectorAll('.section');
const nextSections = document.querySelectorAll('.next');

let isMoving = false;

function checkScroll() {

  // ① ふわっと表示
  sections.forEach(section => {
    const position = section.getBoundingClientRect().top;
    const screenPosition = window.innerHeight / 1.2;

    if (position < screenPosition) {
      section.classList.add('show');
    }
  });

  // ② スクロール量チェック ←追加
  if (window.scrollY < 100) return;

  // ③ 遷移判定
  if (isMoving) return;

  nextSections.forEach(next => {
    const rect = next.getBoundingClientRect();

    if (rect.top < window.innerHeight * 0.8) {
      isMoving = true;

      document.body.classList.add('fade-out');

      setTimeout(() => {
        window.location.href = "index.html";
      }, 800);
    }
  });
}

// 初回実行
checkScroll();

window.addEventListener('scroll', checkScroll);
</script>
